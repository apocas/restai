---
services:
  restai:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 60s
    ports:
      - ${RESTAI_PORT:-9000}:${RESTAI_PORT:-9000}
    volumes:
      - local_cache:/home/user/.cache
    environment:
      RESTAI_PORT: ${RESTAI_PORT:-9000}
      RESTAI_DEV: ${RESTAI_DEV:-false}
      RESTAI_DEFAULT_PASSWORD: ${RESTAI_DEFAULT_PASSWORD:-admin}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # LLM API keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      # Database (defaults to SQLite if none set)
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB:-restai}
      POSTGRES_USER: ${POSTGRES_USER:-restai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_DB: ${MYSQL_DB:-restai}
      MYSQL_USER: ${MYSQL_USER:-restai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SQLITE_PATH: ${SQLITE_PATH}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE}
      # Redis (optional — enables persistent chat memory)
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      # ChromaDB (optional — remote vector store)
      CHROMADB_HOST: ${CHROMADB_HOST}
      CHROMADB_PORT: ${CHROMADB_PORT:-8000}
      # Security
      RESTAI_AUTH_SECRET: ${RESTAI_AUTH_SECRET}
      RESTAI_FERNET_KEY: ${RESTAI_FERNET_KEY}
      SSO_SECRET_KEY: ${SSO_SECRET_KEY}
      # Agent settings
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS}
      MCP_SERVER: ${MCP_SERVER}
      # GPU (auto-detected, override if needed)
      RESTAI_GPU: ${RESTAI_GPU}
      ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY:-False}
      SENTRY_DSN: ${SENTRY_DSN}

  # Optional services — enable with: docker compose --profile redis up
  redis:
    image: redis/redis-stack-server
    profiles: [redis]
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16
    profiles: [postgres]
    ports:
      - 5432:5432
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restai}
      POSTGRES_USER: ${POSTGRES_USER:-restai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGEME!}
    volumes:
      - pgdata:/var/lib/postgresql/data

  mysql:
    image: mysql:8
    profiles: [mysql]
    ports:
      - 3306:3306
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-restai}
      MYSQL_USER: ${MYSQL_USER:-restai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-CHANGEME!}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGEME!}
    volumes:
      - mysqldata:/var/lib/mysql

  chromadb:
    image: chromadb/chroma
    profiles: [chromadb]
    ports:
      - 8000:8000
    volumes:
      - chromadata:/chroma/chroma
    restart: unless-stopped

volumes:
  local_cache:
  pgdata:
  mysqldata:
  redis_data:
  chromadata:
