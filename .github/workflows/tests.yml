name: Tests

on:
  push:
    branches: [master, beta]
  pull_request:
    branches: [master, beta]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Create frontend build placeholder
        run: mkdir -p frontend/build && echo '<!doctype html>' > frontend/build/index.html

      - name: Install dependencies
        run: uv sync --no-group gpu

      - name: Initialize database
        run: uv run --no-group gpu python database.py

      - name: Run tests
        run: uv run --no-group gpu pytest tests/ -v --tb=short --ignore=tests/test_projects.py --junitxml=test-results.xml

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests
          path: test-results.xml
          reporter: java-junit

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        env:
          CI: false
        run: cd frontend && npm ci && npm run build
