replicaCount: 1

image:
  repository: ghcr.io/apocas/restai
  pullPolicy: IfNotPresent
  # Overrides the image tag (default is the chart appVersion)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# -- RESTai application configuration (non-sensitive, stored in ConfigMap)
#
# Only env vars that the app reads at boot live here. Almost everything
# admins might want to tune at runtime — proxy URL, OAuth providers,
# Redis address, MCP toggle, app name, branding, GPU flag, audio limits,
# Docker sandbox, agentic browser, retention, 2FA enforcement — is
# DB-managed via the platform Settings page (config module __getattr__
# resolves these from the `settings` table on every access). Setting
# them via env here would be silently ignored and create drift between
# what the chart says and what the running platform actually uses.
#
# That's why this block is small. Don't grow it without confirming the
# key is read at *boot* and not via the GUI-managed settings DB.
config:
  port: 9000
  logLevel: "INFO"
  dev: false
  anonymizedTelemetry: false
  embeddingsPath: "/app/embeddings/"

  # Database — one of: postgresql, mysql, sqlite
  database:
    type: "postgresql"
    postgres:
      host: ""
      port: "5432"
      database: "restai"
      user: "restai"
    mysql:
      host: ""
      database: "restai"
      user: "restai"
    sqlite:
      # Where the sqlite file lives inside the pod. Combined with
      # `persistence.enabled` below, this is the path on the mounted PVC
      # so the DB survives pod restarts. Ignored when database.type is
      # postgresql or mysql.
      path: "/app/data/restai.db"
    poolSize: 100
    maxOverflow: 300
    poolRecycle: 300

  # Base URL for OAuth callbacks and absolute links. Boot-only because
  # FastAPI uses it before the DB is reachable.
  restaiUrl: ""
  defaultDevice: ""

# -- Sensitive values (stored in K8s Secret).
#
# Only boot-only secrets here for the same reason values.yaml is slim.
# Provider API keys (OpenAI/Anthropic/Google/etc.), OAuth client
# secrets, proxy keys, Redis password, etc. live in the DB and are
# entered via the platform Settings or the per-LLM/embedding form.
secrets:
  # IMPORTANT: For production/multi-replica deployments you MUST set
  # authSecret + ssoSecretKey + fernetKey to fixed values. If left
  # empty, each pod auto-generates random values which breaks JWT
  # validation and Fernet decryption across pods/restarts.
  authSecret: ""
  ssoSecretKey: ""
  fernetKey: ""

  # Admin user password (used on first install only — the row is created
  # when the `users` table is empty; later rotations happen in the UI).
  defaultPassword: "admin"

  # Database passwords — boot-only because we connect before any GUI
  # could possibly tell us where the DB is.
  postgresPassword: ""
  mysqlPassword: ""

  # Sentry DSN — boot-only because sentry_sdk.init runs before the DB.
  sentryDsn: ""

# -- Use an existing K8s Secret instead of chart-managed secrets.
# When set, the chart will NOT create a Secret resource and will reference
# this secret name in envFrom. Your secret must contain at least
# RESTAI_AUTH_SECRET, RESTAI_FERNET_KEY, SSO_SECRET_KEY,
# RESTAI_DEFAULT_PASSWORD; plus POSTGRES_PASSWORD or MYSQL_PASSWORD
# depending on database.type.
existingSecret: ""

# -- Persistent storage for SQLite.
#
# Only relevant when `config.database.type == "sqlite"`. When enabled,
# the chart creates a PVC and mounts it at the directory of
# `config.database.sqlite.path` so the DB survives pod restarts.
# Postgres/MySQL deployments don't need this.
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # Use an existing PVC instead of creating one. When set, chart does
  # not create a PVC and just mounts the named claim.
  existingClaim: ""

# -- Service
service:
  type: ClusterIP
  port: 9000

# -- Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: restai.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: restai-tls
    #   hosts:
    #     - restai.local

# -- Resource limits
resources: {}
  # limits:
  #   cpu: 2000m
  #   memory: 4Gi
  # requests:
  #   cpu: 500m
  #   memory: 1Gi

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Probes
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  # 30 * 10s = 5 min startup window (Brain init + migrations can be slow)
  failureThreshold: 30

nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  # Matches the Dockerfile's `useradd --uid 1000 user`. Don't change
  # without rebuilding the image — uid 1000 owns /app and the venv.
  runAsUser: 1000
