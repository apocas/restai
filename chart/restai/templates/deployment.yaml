apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "restai.fullname" . }}
  labels:
    {{- include "restai.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "restai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "restai.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "restai.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "restai.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Bootstrap the schema, run any pending migrations, then start
          # the server. All three are idempotent:
          #   - database.py only seeds when the `users` table is missing
          #   - migrate.py upgrade is no-op past `head`
          #   - main.py is the long-running uvicorn server
          # The earlier chart shape used an initContainer for database.py,
          # but each K8s container has its own writable layer — the init
          # container's writes never reached the main container's /app,
          # so on sqlite the DB was always empty and login 500'd. Doing
          # everything inside the same container avoids that footgun.
          command:
            - sh
            - -c
            - >-
              .venv/bin/python database.py &&
              .venv/bin/python migrate.py upgrade &&
              .venv/bin/python main.py
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "restai.configMapName" . }}
            - secretRef:
                name: {{ include "restai.secretName" . }}
          {{- if and (eq .Values.config.database.type "sqlite") .Values.persistence.enabled }}
          volumeMounts:
            - name: sqlite-data
              mountPath: {{ dir .Values.config.database.sqlite.path | quote }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- if and (eq .Values.config.database.type "sqlite") .Values.persistence.enabled }}
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-sqlite" (include "restai.fullname" .)) }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
