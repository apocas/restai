{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "restai.fullname" . }}
  labels:
    {{- include "restai.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Application secrets
  {{- if .Values.secrets.authSecret }}
  RESTAI_AUTH_SECRET: {{ .Values.secrets.authSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.ssoSecretKey }}
  SSO_SECRET_KEY: {{ .Values.secrets.ssoSecretKey | quote }}
  {{- end }}
  {{- if .Values.secrets.fernetKey }}
  RESTAI_FERNET_KEY: {{ .Values.secrets.fernetKey | quote }}
  {{- end }}

  # Admin
  RESTAI_DEFAULT_PASSWORD: {{ .Values.secrets.defaultPassword | quote }}

  # Database passwords
  {{- if .Values.secrets.postgresPassword }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.mysqlPassword }}
  MYSQL_PASSWORD: {{ .Values.secrets.mysqlPassword | quote }}
  {{- end }}

  # LLM API keys
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.groqApiKey }}
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.googleApiKey }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.xaiApiKey }}
  XAI_API_KEY: {{ .Values.secrets.xaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.hfToken }}
  HF_TOKEN: {{ .Values.secrets.hfToken | quote }}
  {{- end }}

  # Vector store secrets
  {{- if .Values.secrets.weaviateApiKey }}
  WEAVIATE_API_KEY: {{ .Values.secrets.weaviateApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.pineconeApiKey }}
  PINECONE_API_KEY: {{ .Values.secrets.pineconeApiKey | quote }}
  {{- end }}

  # LDAP
  {{- if .Values.secrets.ldapAppPassword }}
  LDAP_APP_PASSWORD: {{ .Values.secrets.ldapAppPassword | quote }}
  {{- end }}

  # OAuth client secrets
  {{- if .Values.secrets.googleClientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.microsoftClientSecret }}
  MICROSOFT_CLIENT_SECRET: {{ .Values.secrets.microsoftClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.githubClientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  OAUTH_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}

  # Proxy
  {{- if .Values.secrets.proxyKey }}
  PROXY_KEY: {{ .Values.secrets.proxyKey | quote }}
  {{- end }}

  # Monitoring
  {{- if .Values.secrets.sentryDsn }}
  SENTRY_DSN: {{ .Values.secrets.sentryDsn | quote }}
  {{- end }}
{{- end }}
